name: Update Wiki Market News

on:
  schedule:
    # 日本市場前: 23:30 UTC = 翌 08:30 JST (月〜金)
    - cron: "30 23 * * 0-4"
    # 米国市場前: 14:00 UTC = 09:00 EST / 10:00 EDT (月〜金)
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      market:
        description: "Market to update (us / jp / both)"
        required: false
        default: "both"

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # どのマーケットを更新するか決定
      - name: Determine target market
        id: market
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          INPUT="${{ github.event.inputs.market }}"

          if [ -n "$INPUT" ]; then
            echo "target=$INPUT" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -eq 23 ] || [ "$HOUR" -eq 0 ]; then
            echo "target=jp" >> "$GITHUB_OUTPUT"
          else
            echo "target=us" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki
          # wiki が空の場合に備えて Home.md を作成
          if [ ! -f wiki/Home.md ]; then
            mkdir -p wiki
            echo "# Stock Market News Wiki" > wiki/Home.md
            echo "" >> wiki/Home.md
            echo "株式市場に関するニュースを自動更新するWikiです。" >> wiki/Home.md
            echo "" >> wiki/Home.md
            echo "- [日本市場ニュース](Japan-Market-News)" >> wiki/Home.md
            echo "- [米国市場ニュース](US-Market-News)" >> wiki/Home.md
          fi

      - name: Fetch Japan market news
        if: steps.market.outputs.target == 'jp' || steps.market.outputs.target == 'both'
        run: |
          python scripts/fetch_news.py --market jp --output wiki/Japan-Market-News.md

      - name: Fetch US market news
        if: steps.market.outputs.target == 'us' || steps.market.outputs.target == 'both'
        run: |
          python scripts/fetch_news.py --market us --output wiki/US-Market-News.md

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MARKET="${{ steps.market.outputs.target }}"
            git commit -m "chore: update ${MARKET} market news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
